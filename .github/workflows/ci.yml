name: AgroChain AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. TEST ──────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django checks
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: dummy-key-for-ci
        run: |
          python manage.py check
          python manage.py migrate --run-syncdb

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: dummy-key-for-ci
        run: python manage.py test

  # ── 2. BUILD DOCKER IMAGE ────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/agrochain-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/agrochain-ai:${{ github.sha }}
          cache-from: type=gistry,ref=${{ secrets.DOCKER_USERNAME }}/agrochain-ai:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agrochain-ai:buildcache,mode=max

  # ── 3. DEPLOY TO AWS EC2 / RENDER / RAILWAY ──
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # Option A: Deploy to Render (free tier available)
